<!DOCTYPE html>
<html lang="en" data-theme="{{ user_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Destination | CORE STORE</title>    
    <!-- Hydrate theme BEFORE Tailwind loads -->
    <script>
        (function() {
            const themeData = document.documentElement.getAttribute('data-theme');
            if (themeData === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
        <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a; 
            --accent: #2563eb; 
            --bg-main: #f8fafc;
        }

        /* Dark Mode Core Variables */
        html.dark {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg-main: #0f172a; /* Tailwind slate-950 */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--primary); 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Unified Glassmorphism */
        .glass { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 4px; /* Sharp Edges */
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        html.dark .glass {
            background-color: #1e293b !important; /* slate-800 */
            border-color: #334155 !important; /* slate-700 */
        }

        /* Technical Input Field (Fixed for Dark Mode) */
        .input-field { 
            background-color: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 4px; 
            padding: 0.85rem 1.25rem; 
            font-size: 12px; 
            font-weight: 600; 
            width: 100%; 
            transition: all 0.3s ease; 
            color: #0f172a;
            text-transform: uppercase;
        }
        html.dark .input-field {
            background-color: #0f172a; /* slate-950 */
            border-color: #334155; /* slate-700 */
            color: #ffffff;
        }
        html.dark .input-field::placeholder {
            color: #64748b; /* slate-500 */
        }
        
        .input-field:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
            background-color: #fafafa; 
        }
        html.dark .input-field:focus {
            background-color: #1e293b; /* slate-800 */
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .label-text { 
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: #64748b; /* slate-500 */
            margin-bottom: 0.5rem; 
            display: block; 
            margin-left: 2px;
            transition: color 0.3s ease;
        }
        html.dark .label-text {
            color: #94a3b8; /* slate-400 */
        }

        .loader { 
            border: 2px solid #f3f3f3; 
            border-top: 2px solid var(--accent); 
            border-radius: 50%; 
            width: 12px; 
            height: 12px; 
            animation: spin 1s linear infinite; 
            display: none; 
        }
        html.dark .loader { border-color: #334155; border-top-color: var(--accent); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Type Toggles (Fixed Invisible Text Bug in Dark Mode) */
        .type-radio:checked + label { 
            background-color: #0f172a; 
            color: white; 
            border-color: #0f172a; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        html.dark .type-radio:checked + label {
            background-color: var(--accent); /* Sleek blue instead of white */
            border-color: var(--accent);
            color: white;
        }

        .btn-main {
            border-radius: 2px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4 md:px-6 flex items-center justify-center">

    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-[#f8fafc] via-[#eff6ff] to-[#f8fafc] dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 transition-colors duration-500"></div>

    <div class="max-w-xl w-full animate__animated animate__fadeIn">
        <header class="mb-10 flex flex-col items-center transition-colors">
            <div class="bg-blue-600 p-2 rounded-sm text-white mb-4 shadow-lg transition-colors">
                <i class="fa-solid fa-map-location-dot text-xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter leading-none transition-colors">
                Register New <span class="text-blue-600 dark:text-blue-400">Endpoint</span>
            </h1>
            <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] mt-3 transition-colors">Logistics Registry Management</p>
        </header>

        <form method="POST" class="glass p-8 md:p-10 shadow-xl relative transition-colors">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="label-text">Authorized Recipient</label>
                        <input type="text" name="full_name" required placeholder="Enter full legal name" class="input-field">
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Communication Line (Phone)</label>
                        <input type="tel" name="phone_number" required placeholder="+00 00000 00000" class="input-field">
                    </div>
                </div>

                <div class="h-px bg-slate-100 dark:bg-slate-700 transition-colors"></div>

                <div class="space-y-5">
                    <div class="relative">
                        <label class="label-text flex items-center gap-2">
                            Regional Pincode <span id="pin-loader" class="loader"></span>
                        </label>
                        <input type="text" name="pincode" id="pincode" maxlength="6" required placeholder="000000" class="input-field border-blue-100 dark:border-slate-600 bg-blue-50/30 dark:bg-slate-900">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">Structural Info (House/Flat)</label>
                            <input type="text" name="house_info" required placeholder="E.G. SUITE 101" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Locality / Sector</label>
                            <input type="text" name="locality" id="locality" required placeholder="Sector / Area Name" class="input-field">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="label-text">Metropolis</label>
                            <input type="text" name="city" id="city" required placeholder="City" class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Administrative State</label>
                            <input type="text" name="state" id="state" required placeholder="State" class="input-field">
                        </div>
                    </div>

                    <div>
                        <label class="label-text">Navigation Reference (Landmark)</label>
                        <input type="text" name="landmark" placeholder="Near major installation" class="input-field">
                    </div>
                </div>

                <div class="space-y-5 pt-2">
                    <div>
                        <label class="label-text">Destination Category</label>
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <input type="radio" name="address_type" id="HOME" value="HOME" class="hidden type-radio" checked>
                                <label for="HOME" class="block text-center py-3 border border-slate-200 dark:border-slate-700 rounded-sm text-[10px] font-black uppercase cursor-pointer transition-all hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300">Residential</label>
                            </div>
                            <div class="flex-1">
                                <input type="radio" name="address_type" id="WORK" value="WORK" class="hidden type-radio">
                                <label for="WORK" class="block text-center py-3 border border-slate-200 dark:border-slate-700 rounded-sm text-[10px] font-black uppercase cursor-pointer transition-all hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300">Commercial</label>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 px-1">
                        <input type="checkbox" name="is_default" id="is_default" class="w-4 h-4 rounded-sm accent-blue-600 cursor-pointer">
                        <label for="is_default" class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Set as Primary Endpoint</label>
                    </div>
                </div>

                <div class="pt-6 space-y-3 transition-colors">
                    <button type="submit" class="btn-main w-full bg-slate-900 dark:bg-blue-600 text-white py-4 text-[11px] tracking-widest hover:bg-blue-600 dark:hover:bg-blue-500 transition-all shadow-lg active:scale-95">
                        Commit Destination to Registry
                    </button>
                    <button type="button" onclick="window.history.back()" class="btn-main w-full bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 py-4 text-[11px] tracking-widest border border-slate-200 dark:border-slate-700 hover:text-slate-900 dark:hover:text-white hover:border-slate-900 dark:hover:border-slate-500 transition-all">
                        Abort Entry
                    </button>
                </div>
            </div>
        </form>
        <p class="text-center text-[8px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-[0.6em] mt-10 transition-colors">Secure Data Transmit Protocol v2.6</p>
    </div>

    <script>
        const pinInput = document.getElementById('pincode');
        const cityInput = document.getElementById('city');
        const stateInput = document.getElementById('state');
        const areaInput = document.getElementById('locality');
        const loader = document.getElementById('pin-loader');

        pinInput.addEventListener('input', async (e) => {
            const pin = e.target.value.trim();
            if (pin.length === 6) {
                loader.style.display = "inline-block";
                try {
                    // 1. Try Zippopotam (High Accuracy for Primary Locations)
                    const res = await fetch(`https://api.zippopotam.us/in/${pin}`);
                    if (res.ok) {
                        const data = await res.json();
                        const place = data.places[0];
                        areaInput.value = place['place name'].toUpperCase();
                        cityInput.value = (place['community'] || place['place name']).toUpperCase();
                        stateInput.value = place['state'].toUpperCase();
                    } else {
                        // 2. Fallback to India Post API
                        const postRes = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                        const postData = await postRes.json();
                        if (postData[0].Status === "Success") {
                            const detail = postData[0].PostOffice[0];
                            areaInput.value = detail.Name.toUpperCase();
                            cityInput.value = detail.District.toUpperCase();
                            stateInput.value = detail.State.toUpperCase();
                        }
                    }
                } catch (err) {
                    console.error("Accuracy Engine Failure");
                } finally {
                    loader.style.display = "none";
                }
            }
        });

        // Clear pincode if user manually edits the City to avoid data mismatch
        cityInput.addEventListener('input', () => {
            if (cityInput.value.length > 0) pinInput.value = "";
        });
    </script>

    <script>
        // Theme Initialization
        function applyTheme() {
            const themeData = document.documentElement.getAttribute('data-theme');
            if (themeData === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        
        // Apply theme on page load
        document.addEventListener('DOMContentLoaded', applyTheme);
        applyTheme();
    </script>
</body>
</html>
